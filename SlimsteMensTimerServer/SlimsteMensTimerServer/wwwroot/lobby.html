<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Slimste Mens — Lobby</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/theme-toggle.css" />
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <script src="/js/theme.js"></script>
</head>
<body>
<div class="container">

  <div class="logo-header"><img src="/images/logo-horiz.png" alt="De Slimste Mens Scorebord" /></div>
  <div class="title text-title">De Slimste Mens</div>

  <!-- Banner (hidden until an event requires it) -->
  <div class="banner" id="bannerWrap" style="display:none">
    <span id="bannerText"></span>
  </div>

  <!-- ── Landing view ─────────────────────────────────────── -->
  <div id="landing" class="landing">
    <p>Maak een nieuwe sessie aan en laat spelers scannen om mee te doen.</p>
    <button id="btnNewSession" class="btn">Nieuwe Sessie</button>
    <div class="app-download">
      <img src="/api/appqr" alt="Download de app" class="app-qr" />
      <span class="app-download-label"><p>Download de app</p></span>
    </div>
  </div>

  <!-- ── Lobby view ───────────────────────────────────────── -->
  <div id="lobby" style="display:none">
    <div class="lobby-layout">

      <!-- QR + session code -->
      <div class="card qr-section">
        <span class="qr-label">Scan om mee te doen</span>
        <a id="qrLink" href="#" target="_blank" rel="noopener">
          <img id="qrImage" src="" alt="QR code" />
        </a>
        <span class="session-code" id="sessionCode"></span>
      </div>

      <!-- Player list + start button -->
      <div class="card players-section">
        <h2>Spelers</h2>
        <ul class="player-list" id="playerList">
          <li class="empty-hint">Wacht op spelers…</li>
        </ul>
        <button id="btnStartGame" class="btn" disabled>Start Spel</button>
      </div>

    </div>
  </div>

  <footer class="page-footer">
    <a href="/status.html">Serverstatus</a>
    <span id="footerVersion"></span>
  </footer>

</div>

<script src="/js/signalr.min.js"></script>
<script src="/js/lobby.js"></script>
<button id="themeToggleBtn" onclick="toggleTheme()" title="Schakel thema">🎨</button>
<script>
  fetch('/api/status').then(r => r.ok ? r.json() : null).then(d => {
    if (d) document.getElementById('footerVersion').textContent = ' · ' + d.version;
  }).catch(() => {});
</script>
</body>
</html>
