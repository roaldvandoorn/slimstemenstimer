<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Slimste Mens — Meespelen</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/theme-toggle.css" />
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <script src="/js/theme.js"></script>
</head>
<body>

  <!-- ══ JOIN VIEW ══ -->
  <div id="joinView" class="container" style="display:none; padding-top:4rem">
    <div class="logo-header"><img src="/images/logo-horiz.png" alt="De Slimste Mens Scorebord" /></div>
    <div class="title text-title" style="font-size:1.4rem">De Slimste Mens</div>
    <div class="card" style="max-width:380px; margin:0 auto; text-align:center">
      <p id="joinSessionCode" style="opacity:.7; margin-bottom:1.5rem"></p>
      <input id="nameInput" class="name-input" type="text" placeholder="Jouw naam"
             maxlength="32" autocomplete="off" />
      <button id="btnJoin" class="btn" style="margin-top:1rem; width:100%">Meedoen</button>
      <p id="joinError" style="margin-top:1rem; opacity:.7; font-size:.9rem; min-height:1.2rem"></p>
    </div>
  </div>

  <!-- ══ WAITING VIEW ══ -->
  <div id="waitView" class="container" style="display:none; padding-top:6rem; text-align:center">
    <div class="logo-header"><img src="/images/logo-horiz.png" alt="De Slimste Mens Scorebord" /></div>
    <div class="title text-title" style="font-size:1.4rem">De Slimste Mens</div>
    <p style="opacity:.7; font-size:1.1rem">Wachten op de host om het spel te starten…</p>
  </div>

  <!-- ══ GAME VIEW ══ -->
  <div id="gameView" class="player-layout" style="display:none">

    <!-- Left sidebar: other players (landscape only) -->
    <div class="player-sidebar">
      <div class="others-heading">Andere spelers</div>
      <div id="othersSidebar" class="others-list"></div>
    </div>

    <!-- Main: own score, timer, controls -->
    <div class="player-main">

      <div class="banner" id="gameBanner" style="display:none">Spel afgelopen.</div>

      <div class="player-own-name" id="ownName"></div>
      <div class="player-own-score" id="ownScore">60</div>

      <div class="player-controls">
        <button class="btn btn-danger player-score-btn" id="btnMinus">−20</button>
        <button class="btn player-start-btn" id="btnStart">▶ Start</button>
        <button class="btn btn-danger player-score-btn" id="btnPlus">+20</button>
      </div>
      <div style="text-align:center; margin-top:1.25rem">
        <button class="btn btn-danger" id="btnReset" style="font-size:.9rem; padding:10px 28px">↺ Herstel (60)</button>
      </div>

    </div>

    <!-- Bottom panel: other players (portrait only) -->
    <div class="player-others-bottom">
      <div class="others-heading">Andere spelers</div>
      <div id="othersBottom" class="others-row"></div>
    </div>

  </div><!-- /gameView -->

  <script src="/js/signalr.min.js"></script>
  <script src="/js/player.js"></script>
<button id="themeToggleBtn" class="fab-btn" onclick="toggleTheme()" title="Schakel thema">🎨</button>
</body>
</html>
