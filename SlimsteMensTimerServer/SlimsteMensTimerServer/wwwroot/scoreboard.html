<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Slimste Mens — Scorebord</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/theme-toggle.css" />
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <script src="/js/theme.js"></script>
</head>
<body>
<div class="container">

  <div class="logo-header"><img src="/images/logo-horiz.png" alt="De Slimste Mens Scorebord" /></div>
  <div class="title text-title">De Slimste Mens</div>

  <div class="session-subtitle" id="sessionSubtitle"></div>

  <!-- Banner: shown when GameEnded or session not found -->
  <div class="banner" id="banner" style="display:none"></div>

  <!-- Scoreboard grid — tiles are added dynamically -->
  <div class="scoreboard-grid" id="scoreGrid"></div>

  <!-- Host controls -->
  <div class="host-controls">
    <button id="btnEndGame"  class="btn btn-danger">Beëindig spel</button>
    <button id="btnNewGame"  class="btn" style="display:none">Nieuw Spel</button>
  </div>

  <footer class="page-footer">
    <a href="/status.html">Serverstatus</a>
    <span id="footerVersion"></span>
  </footer>

</div>

<script src="/js/signalr.min.js"></script>
<script src="/js/scoreboard.js"></script>
<button id="themeToggleBtn" onclick="toggleTheme()" title="Schakel thema">🎨</button>
<script>
  fetch('/api/status').then(r => r.ok ? r.json() : null).then(d => {
    if (d) document.getElementById('footerVersion').textContent = ' · ' + d.version;
  }).catch(() => {});
</script>
</body>
</html>
